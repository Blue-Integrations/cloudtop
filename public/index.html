<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cloudtop · Server Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --ok: #3fb950;
      --warn: #d29922;
      --danger: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      line-height: 1.3;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0.75rem;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-weight: 600;
      font-size: 1.1rem;
      margin: 0;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
    }
    .last-update {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .grid {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.85rem;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }
    .card.stale { opacity: 0.75; border-color: var(--warn); }
    .card .name {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 0.9rem;
      min-width: 8rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .card .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .card .dot.ok { background: var(--ok); }
    .card .dot.warn { background: var(--warn); }
    .card .dot.danger { background: var(--danger); }
    .card .stat {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      min-width: 5rem;
    }
    .card .stat .label { color: var(--muted); font-size: 0.7rem; width: 2.2rem; }
    .card .stat .value { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
    .card .bar-wrap {
      width: 4rem;
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }
    .card .bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .card .bar.cpu { background: var(--accent); }
    .card .bar.mem { background: var(--ok); }
    .card .bar.disk { background: var(--warn); }
    .card .bar.ok { background: var(--ok); }
    .card .bar.warn { background: var(--warn); }
    .card .bar.danger { background: var(--danger); }
    .card .stat-net .value { font-size: 0.75rem; white-space: nowrap; }
    .card .load-up {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-left: auto;
    }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .error {
      background: rgba(248,81,73,0.15);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 0.5rem;
      border-radius: 6px;
      margin-bottom: 0.5rem;
      font-size: 0.8rem;
    }
    footer {
      margin-top: 0.75rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
    }
    .snmp-section { margin-bottom: 1rem; }
    .snmp-section h2 {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin: 0 0 0.5rem 0;
      font-family: 'JetBrains Mono', monospace;
    }
    .snmp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 0.75rem;
    }
    .snmp-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
    }
    .snmp-card.stale { opacity: 0.75; border-color: var(--warn); }
    .snmp-card .snmp-title {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .snmp-card .snmp-meta { font-size: 0.7rem; color: var(--muted); margin-bottom: 0.5rem; }
    .snmp-graph {
      width: 100%;
      height: 56px;
      background: #1c2128;
      border-radius: 4px;
      margin-top: 0.35rem;
      display: block;
    }
    .snmp-card .snmp-rate { font-size: 0.7rem; color: var(--muted); margin-top: 0.25rem; }
    .snmp-legend { font-size: 0.65rem; color: var(--muted); margin-top: 0.2rem; }
    .snmp-legend .in { color: #58a6ff; }
    .snmp-legend .out { color: #3fb950; }
    .snmp-debug { font-size: 0.65rem; color: var(--muted); margin-top: 0.2rem; font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>cloudtop.biapps.dev</h1>
      <span class="last-update" id="lastUpdate">—</span>
    </header>
    <div id="error" class="error" style="display: none;"></div>
    <div id="snmpSection" class="snmp-section" style="display: none;">
      <h2>SNMP devices <a href="/api/snmp-debug" target="_blank" rel="noopener" style="font-size:0.7rem;color:var(--muted);margin-left:0.5rem;">(debug output)</a></h2>
      <div class="snmp-grid" id="snmpGrid"></div>
    </div>
    <div class="grid" id="grid"></div>
    <footer>Refreshes every 15s</footer>
  </div>
  <script>
    const fmt = {
      percent: (n) => (n == null ? '—' : n.toFixed(0) + '%'),
      num: (n) => (n == null ? '—' : Number(n).toFixed(1)),
      kB_s: (n) => (n == null || n === undefined ? '0.00' : (Number(n) / 1024).toFixed(2)) + ' KB/s',
      uptime: (s) => {
        if (s == null || s < 0) return '—';
        const d = Math.floor(s / 86400);
        const h = Math.floor((s % 86400) / 3600);
        const m = Math.floor((s % 3600) / 60);
        const parts = [];
        if (d) parts.push(d + 'd');
        if (h) parts.push(h + 'h');
        parts.push(m + 'm');
        return parts.join(' ');
      },
    };
    function barClass(pct) {
      if (pct >= 90) return 'danger';
      if (pct >= 75) return 'warn';
      return 'ok';
    }
    function statusDot(server) {
      const age = (Date.now() - server.lastSeen) / 1000;
      if (age > 300) return 'danger';
      if (age > 60) return 'warn';
      return 'ok';
    }
    function render(servers) {
      const g = document.getElementById('grid');
      if (!servers.length) {
        g.innerHTML = '<p class="muted" style="grid-column:1/-1;text-align:center;color:var(--muted);font-size:0.85rem;">No servers reporting yet. Run the agent on each host or set LOCAL_SERVER_NAME here.</p>';
        document.getElementById('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString();
        return;
      }
      g.innerHTML = servers.map((s) => {
        const st = s.stats || {};
        const cpu = st.cpu;
        const mem = st.memory;
        const disk = st.disk;
        const load = st.load;
        const uptime = st.uptime;
        const net = st.network;
        const cpuPct = cpu && typeof cpu.usagePercent === 'number' ? cpu.usagePercent : null;
        const memPct = mem && typeof mem.usedPercent === 'number' ? mem.usedPercent : null;
        const diskPct = disk && typeof disk.usedPercent === 'number' ? disk.usedPercent : null;
        const dot = statusDot(s);
        return `
          <div class="card ${s.stale ? 'stale' : ''}" title="Last seen: ${new Date(s.lastSeen).toLocaleString()}">
            <div class="name"><span class="dot ${dot}"></span>${escapeHtml(s.name)}</div>
            <div class="stat">
              <span class="label">CPU</span>
              <div class="bar-wrap"><div class="bar cpu ${barClass(cpuPct)}" style="width:${Math.min(100, cpuPct || 0)}%"></div></div>
              <span class="value">${fmt.percent(cpuPct)}</span>
            </div>
            <div class="stat">
              <span class="label">Mem</span>
              <div class="bar-wrap"><div class="bar mem ${barClass(memPct)}" style="width:${Math.min(100, memPct || 0)}%"></div></div>
              <span class="value">${fmt.percent(memPct)}</span>
            </div>
            <div class="stat">
              <span class="label">Disk</span>
              <div class="bar-wrap"><div class="bar disk ${barClass(diskPct)}" style="width:${Math.min(100, diskPct || 0)}%"></div></div>
              <span class="value">${fmt.percent(diskPct)}</span>
            </div>
            <div class="stat stat-net">
              <span class="label">Net</span>
              <span class="value">↓ ${fmt.kB_s(net && net.rx_sec)} ↑ ${fmt.kB_s(net && net.tx_sec)}</span>
            </div>
            <div class="load-up">Load ${load ? fmt.num(load.load1) + ' ' + fmt.num(load.load5) + ' ' + fmt.num(load.load15) : '—'} · Up ${uptime ? fmt.uptime(uptime.seconds) : '—'}</div>
          </div>
        `;
      }).join('');
      document.getElementById('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString() + ' · ' + servers.length + ' server(s)';
    }
    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    function snmpSparkline(historyIn, historyOut, w, h) {
      const pad = 6;
      const strokeIn = '#58a6ff';
      const strokeOut = '#3fb950';
      function toPoints(arr) {
        if (!arr || arr.length === 0) return '';
        const vals = arr.map(function(p) { return p.v; });
        const minV = Math.min.apply(null, vals);
        const maxV = Math.max.apply(null, vals);
        const range = maxV - minV || 1;
        const n = arr.length;
        const toY = function(v) { return h - pad - ((v - minV) / range) * (h - 2 * pad); };
        if (n === 1) return pad + ',' + toY(arr[0].v) + ' ' + (w - pad) + ',' + toY(arr[0].v);
        const xScale = (w - 2 * pad) / (n - 1);
        return arr.map(function(p, i) { return (pad + i * xScale) + ',' + toY(p.v); }).join(' ');
      }
      const ptsIn = toPoints(historyIn);
      const ptsOut = toPoints(historyOut);
      var body = '';
      if (ptsIn) body += '<polyline fill="none" stroke="' + strokeIn + '" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="' + ptsIn + '"/>';
      if (ptsOut) body += '<polyline fill="none" stroke="' + strokeOut + '" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,4" points="' + ptsOut + '"/>';
      if (!body) body = '<line x1="' + pad + '" y1="' + (h/2) + '" x2="' + (w-pad) + '" y2="' + (h/2) + '" stroke="#8b949e" stroke-width="2"/>';
      return '<svg class="snmp-graph" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' + body + '</svg>';
    }
    function renderSnmp(devices) {
      const section = document.getElementById('snmpSection');
      const g = document.getElementById('snmpGrid');
      if (!devices || !devices.length) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      g.innerHTML = devices.map((d) => {
        const dot = d.stale ? 'danger' : (d.up ? 'ok' : 'warn');
        const uptimeStr = d.sysUpTime != null ? fmt.uptime(d.sysUpTime) : '—';
        const inK = (d.inRate || 0) / 1024;
        const outK = (d.outRate || 0) / 1024;
        const hi = d.historyIn || [];
        const ho = d.historyOut || [];
        const graph = snmpSparkline(hi, ho, 280, 56);
        const lastIn = hi.length ? hi[hi.length - 1].v : null;
        const lastOut = ho.length ? ho[ho.length - 1].v : null;
        const debugStr = 'Points: ' + hi.length + ' in, ' + ho.length + ' out' +
          (lastIn != null ? ' · last ↓' + lastIn : '') +
          (lastOut != null ? ' ↑' + lastOut : '');
        return '<div class="snmp-card ' + (d.stale ? 'stale' : '') + '" title="' + escapeHtml(d.host + ':' + d.port) + '">' +
          '<div class="snmp-title"><span class="dot ' + dot + '"></span>' + escapeHtml(d.name) + '</div>' +
          '<div class="snmp-meta">' + escapeHtml(d.host) + ' · Up ' + uptimeStr + '</div>' +
          graph +
          '<div class="snmp-legend"><span class="in">↓ In</span> <span class="out">↑ Out (dashed)</span></div>' +
          '<div class="snmp-debug">' + escapeHtml(debugStr) + '</div>' +
          '<div class="snmp-rate">↓ ' + inK.toFixed(2) + ' KB/s · ↑ ' + outK.toFixed(2) + ' KB/s</div>' +
          '</div>';
      }).join('');
    }
    async function fetchSnmpDevices() {
      try {
        const r = await fetch('/api/snmp-devices');
        if (r.ok) {
          const data = await r.json();
          renderSnmp(data.devices || []);
        }
      } catch (_) {}
    }
    async function fetchServers() {
      const errEl = document.getElementById('error');
      try {
        const r = await fetch('/api/servers');
        if (!r.ok) {
          if (r.status === 404) throw new Error('API not found — restart the dashboard (node server.js) to load the latest code.');
          throw new Error(r.statusText || 'Request failed');
        }
        const data = await r.json();
        errEl.style.display = 'none';
        render(data.servers || []);
      } catch (e) {
        errEl.textContent = 'Could not load servers: ' + e.message;
        errEl.style.display = 'block';
      }
    }
    fetchServers();
    fetchSnmpDevices();
    setInterval(fetchServers, 15000);
    setInterval(fetchSnmpDevices, 15000);
  </script>
</body>
</html>
